name: Homebrew Regression

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/components/CharacterRulesBridge*.js'
      - 'frontend/src/components/CharacterRulesBridge*.test.js'
      - 'frontend/src/components/clean-sheet/**'
      - 'frontend/src/data/homebrewContent.js'
      - 'frontend/src/data/homebrewContent.test.js'
      - 'frontend/src/data/classResourceRules.js'
      - 'frontend/src/data/classResourceRules.test.js'
      - 'frontend/package.json'
      - 'backend/routes/characters.py'
      - 'backend/routes/homebrew.py'
      - 'backend/tests/test_character_homebrew_payloads.py'
      - 'backend/tests/test_homebrew_route_normalisation.py'
      - 'backend/tests/test_epic_level_spell_slots.py'
      - '.github/workflows/homebrew-regression.yml'
  pull_request:
    paths:
      - 'frontend/src/components/CharacterRulesBridge*.js'
      - 'frontend/src/components/CharacterRulesBridge*.test.js'
      - 'frontend/src/components/clean-sheet/**'
      - 'frontend/src/data/homebrewContent.js'
      - 'frontend/src/data/homebrewContent.test.js'
      - 'frontend/src/data/classResourceRules.js'
      - 'frontend/src/data/classResourceRules.test.js'
      - 'frontend/package.json'
      - 'backend/routes/characters.py'
      - 'backend/routes/homebrew.py'
      - 'backend/tests/test_character_homebrew_payloads.py'
      - 'backend/tests/test_homebrew_route_normalisation.py'
      - 'backend/tests/test_epic_level_spell_slots.py'
      - '.github/workflows/homebrew-regression.yml'

jobs:
  frontend-homebrew:
    name: Frontend homebrew/resource tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: true
      REACT_APP_BACKEND_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run focused homebrew tests
        run: yarn test:homebrew

  backend-homebrew:
    name: Backend homebrew payload tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: test
      JWT_SECRET_KEY: test-secret
      APP_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run focused backend tests
        run: pytest tests/test_character_homebrew_payloads.py tests/test_homebrew_route_normalisation.py tests/test_epic_level_spell_slots.py
